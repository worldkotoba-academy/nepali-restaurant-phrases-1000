const catMap = {}; CATS.forEach(c => catMap[c.no] = c);
const pad = n => String(n).padStart(4,'0');
const list = document.getElementById('list');

// 描画
let html = ''; let lastCat = null;
for (const e of DATA){
  const [n, jp, furi, roma, deva, np, cat] = e;
  const c = catMap[cat];
  if (cat !== lastCat){
    html += `<div class="cathead" style="--c:${c.color}"><div class="no">${String(c.no).padStart(2,'0')} SECTION</div>`
          + `<div class="t">${esc(c.jp)}</div><div class="np">${esc(c.np)}</div></div>`;
    lastCat = cat;
  }
  html += `<div class="card" data-n="${n}" data-s="${esc((n+' '+jp+' '+furi+' '+roma+' '+np).toLowerCase())}" style="--c:${c.color}">`
        + `<div class="num">${pad(n)}</div><div class="body">`
        + `<div class="jp">${esc(jp)}</div><div class="furi">${esc(furi)}</div>`
        + `<div class="roma">${esc(roma)}</div>`
        + `<div class="row"><span class="lbl lbl-p">उ</span><span class="deva">${esc(deva)}</span></div>`
        + `<div class="row"><span class="lbl lbl-m">अ</span><span class="np">${esc(np)}</span></div>`
        + `<div class="btns"><button class="play" onclick="play(${n},this)">🔊 聞く</button>`
        + `<button class="slow" onclick="play(${n},this,true)">ゆっくり</button></div>`
        + `</div></div>`;
}
list.innerHTML = html;

function esc(s){ return String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

// 再生：音声ファイル→失敗時は端末の音声合成へ
let cur = null;
function play(n, btn, slow){
  const jp = DATA[n-1][1];
  if (cur){ cur.pause(); cur=null; }
  document.querySelectorAll('.playing').forEach(x=>x.classList.remove('playing'));
  btn.classList.add('playing');
  const done = ()=> btn.classList.remove('playing');
  const a = new Audio('audio/'+pad(n)+'.m4a');
  a.playbackRate = slow ? 0.72 : 1.0;
  cur = a;
  a.addEventListener('ended', done);
  a.addEventListener('error', ()=>{ done(); speak(jp, slow); });
  a.play().catch(()=>{ done(); speak(jp, slow); });
}
function speak(jp, slow){
  try{
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(jp);
    u.lang = 'ja-JP'; u.rate = slow ? 0.6 : 0.95;
    const v = speechSynthesis.getVoices().find(x=>/ja(-|_)JP/i.test(x.lang));
    if (v) u.voice = v;
    speechSynthesis.speak(u);
  }catch(e){}
}

// 検索
const q = document.getElementById('q');
const empty = document.getElementById('empty');
q.addEventListener('input', ()=>{
  const t = q.value.trim().toLowerCase();
  let shown = 0;
  document.querySelectorAll('.card').forEach(card=>{
    const ok = !t || card.dataset.s.includes(t);
    card.style.display = ok ? '' : 'none';
    if (ok) shown++;
  });
  document.querySelectorAll('.cathead').forEach(h=> h.style.display = t ? 'none' : '');
  empty.style.display = shown ? 'none' : 'block';
});

// トップへ
const toTop = document.getElementById('toTop');
addEventListener('scroll', ()=>{ toTop.style.display = scrollY>500 ? 'block':'none'; });
toTop.onclick = ()=> scrollTo({top:0, behavior:'smooth'});
</script>
